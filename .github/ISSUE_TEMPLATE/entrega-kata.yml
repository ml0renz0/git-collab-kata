name: "Entrega Kata Git Colab"
description: "Entrega la kata mediante un issue con respuestas tipo test y datos de tu rama/PR."
title: "Entrega Kata Git Colab - <rama>"
labels:
  - entrega
  - kata
  - cuestionario
body:
  - type: markdown
    attributes:
      value: |
        Gracias por completar la kata. Usa este formulario para entregar tu rama, tu PR si aplica y responder el cuestionario final.
  - type: input
    id: branch-name
    attributes:
      label: "Rama entregada"
      description: "Nombre de la rama usada para la entrega."
      placeholder: "deliverable/<username>"
    validations:
      required: true
  - type: input
    id: pr-url
    attributes:
      label: "URL del Pull Request"
      description: "Enlace al PR abierto contra tu rama main-<username>. Si trabajaste solo en local, escribe N/A."
      placeholder: "https://github.com/usuario/repo/pull/123"
    validations:
      required: false
  - type: dropdown
    id: q1
    attributes:
      label: "Ejercicio 1A: ¿Qué comando usaste para seleccionar solo parte del cambio?"
      options:
        - "git add -A"
        - "git diff --staged"
        - "git add -p"
        - "git commit --amend"
    validations:
      required: true
  - type: dropdown
    id: q1c
    attributes:
      label: "Ejercicio 1A: Si quieres recuperar el cambio del debug sin sacarlo del stash, ¿qué comando usas?"
      options:
        - "git stash save"
        - "git stash drop"
        - "git stash apply"
        - "git stash pop"
    validations:
      required: true
  - type: dropdown
    id: q1e
    attributes:
      label: "Ejercicio 1A: ¿Qué comando usaste para combinar el commit del test con el commit de la función?"
      options:
        - "git commit --amend"
        - "git rebase -i HEAD~3"
        - "git merge --squash"
        - "git rebase -i HEAD~2"
    validations:
      required: true
  - type: dropdown
    id: q1b
    attributes:
      label: "Ejercicio 1B: ¿Qué comando se usa para combinar el commit de fix con el commit original?"
      options:
        - "git merge --squash"
        - "git cherry-pick HEAD~2"
        - "git rebase -i HEAD~3"
        - "git revert HEAD~1"
    validations:
      required: true
  - type: dropdown
    id: q1d
    attributes:
      label: "Ejercicio 1B: Después del rebase interactivo, ¿qué comando usaste para actualizar la rama remota de forma segura?"
      options:
        - "git push origin main-<username>"
        - "git push --set-upstream"
        - "git push -f"
        - "git push --force-with-lease"
    validations:
      required: true
  - type: dropdown
    id: q2a
    attributes:
      label: "Ejercicio 2A: ¿Qué hace `git push -u origin \"$FEATURE_DIVIDE\"`?"
      options:
        - "Solo empuja commits locales"
        - "Crea un tag en origin"
        - "Empuja la rama y configura upstream"
        - "Reescribe el historial remoto"
    validations:
      required: true
  - type: dropdown
    id: q2b
    attributes:
      label: "Ejercicio 2A: ¿Por qué se crean las ramas de `divide` y `modulus` antes de implementar nada?"
      options:
        - "Para evitar tener que hacer commits"
        - "Para que GitHub cree dos repositorios distintos"
        - "Para que `pytest` se ejecute automáticamente"
        - "Para que partan de la misma base y `modulus` quede desactualizada tras integrar `divide`"
    validations:
      required: true
  - type: dropdown
    id: q2c
    attributes:
      label: "Ejercicio 2B: ¿Qué comando usaste para actualizar la rama de `modulus` con los cambios ya integrados en `$MAIN`?"
      options:
        - "git merge main"
        - "git push -u origin \"$FEATURE_MODULUS\""
        - "git rebase \"origin/$MAIN\""
        - "git pull"
    validations:
      required: true
  - type: dropdown
    id: q2d
    attributes:
      label: "Ejercicio 2B: Al resolver el conflicto, ¿qué cambios deben conservarse?"
      options:
        - "Solo `divide` y `test_divide`"
        - "`divide`, `modulus`, `test_divide` y `test_modulus`"
        - "Solo los cambios de `origin/$MAIN`"
        - "Solo `modulus` y `test_modulus`"
    validations:
      required: true
  - type: dropdown
    id: q2e
    attributes:
      label: "Ejercicio 2B: ¿Qué comando trae los cambios del remoto sin modificar todavía tu rama actual?"
      options:
        - "git pull"
        - "git fetch origin"
        - "git rebase --continue"
        - "git branch -vv"
    validations:
      required: true
  - type: dropdown
    id: q2f
    attributes:
      label: "Ejercicio 2B: Después de resolver conflictos y hacer `git add`, ¿qué comando continúa el rebase?"
      options:
        - "git rebase --abort"
        - "git merge --continue"
        - "git rebase --continue"
        - "git commit --amend"
    validations:
      required: true
  - type: dropdown
    id: q2g
    attributes:
      label: "Ejercicio 2B: Tras rebasear una rama que ya habías subido, ¿qué comando actualiza el remoto de forma segura?"
      options:
        - "git push origin main"
        - "git push --set-upstream"
        - "git push --force-with-lease"
        - "git pull --ff-only"
    validations:
      required: true
  - type: dropdown
    id: q3a
    attributes:
      label: "Ejercicio 3A: ¿Qué nombre base debe mantener la rama del hotfix?"
      options:
        - "feature/division-by-zero-<username>"
        - "hotfix/division-by-zero-<username>"
        - "fix/division-by-zero-<username>"
        - "hotfix/add-none-validation-<username>"
    validations:
      required: true
  - type: dropdown
    id: q3b
    attributes:
      label: "Ejercicio 3A: ¿Qué comando crea y cambia a la rama `$HOTFIX`?"
      options:
        - "git switch \"$HOTFIX\""
        - "git branch \"$HOTFIX\""
        - "git switch -c \"$HOTFIX\""
        - "git checkout main"
    validations:
      required: true
  - type: dropdown
    id: q3c
    attributes:
      label: "Ejercicio 3A: Antes de commitear, ¿qué comando muestra los cambios todavía sin stage?"
      options:
        - "git log --oneline"
        - "git branch -vv"
        - "git diff --staged"
        - "git diff"
    validations:
      required: true
  - type: dropdown
    id: q3d
    attributes:
      label: "Ejercicio 3A: ¿Qué comando sube el hotfix y configura upstream?"
      options:
        - "git push -u origin \"$HOTFIX\""
        - "git pull --ff-only"
        - "git push --force-with-lease"
        - "git fetch origin"
    validations:
      required: true
  - type: dropdown
    id: q3e
    attributes:
      label: "Ejercicio 3A: Tras combinar el PR del hotfix, ¿cómo actualizas tu rama local `$MAIN`?"
      options:
        - "git switch \"$MAIN\" y git pull"
        - "git fetch origin y git rebase --continue"
        - "git switch \"$MAIN\" y git pull --ff-only"
        - "git push -u origin \"$MAIN\""
    validations:
      required: true
  - type: dropdown
    id: q3f
    attributes:
      label: "Ejercicio 3B: ¿Qué comando trae cambios del remoto sin modificar todavía tu rama actual?"
      options:
        - "git pull"
        - "git rebase \"origin/$MAIN\""
        - "git merge \"$MAIN\""
        - "git fetch origin"
    validations:
      required: true
  - type: dropdown
    id: q3g
    attributes:
      label: "Ejercicio 3B: ¿Qué comando actualiza la rama de Persona B con lo ya integrado en `$MAIN`?"
      options:
        - "git merge main"
        - "git rebase \"origin/$MAIN\""
        - "git push -u origin \"$FEATURE_NONE\""
        - "git branch -vv"
    validations:
      required: true
  - type: dropdown
    id: q3h
    attributes:
      label: "Ejercicio 3B: Después de resolver conflictos y hacer `git add`, ¿qué comando continúa el rebase?"
      options:
        - "git rebase --continue"
        - "git rebase --abort"
        - "git commit --amend"
        - "git merge --continue"
    validations:
      required: true
  - type: dropdown
    id: q3i
    attributes:
      label: "Ejercicio 3B: Al resolver el conflicto manual en `add`, ¿qué debe conservarse?"
      options:
        - "Solo el casteo a `int`, eliminando la validación de `None`"
        - "Solo la validación de `None`, eliminando el test de casteo"
        - "El rechazo de `None`, el casteo a `int` y los tests de ambas ramas"
        - "Solo los cambios de la rama que entró primero"
    validations:
      required: true
  - type: dropdown
    id: q4
    attributes:
      label: "Ejercicio 4: ¿Qué hace `git rebase -i --autosquash origin/main`?"
      options:
        - "Hace un merge fast-forward"
        - "Resetea el árbol de trabajo a main"
        - "Reordena y combina commits fixup automáticamente"
        - "Crea un tag de release"
    validations:
      required: true
  - type: dropdown
    id: q5
    attributes:
      label: "Ejercicio 5: ¿Para qué sirve `git reflog`?"
      options:
        - "Mostrar los cambios staged"
        - "Crear una rama nueva"
        - "Ver el historial de referencias para recuperar commits"
        - "Eliminar un commit remoto"
    validations:
      required: true
  - type: dropdown
    id: q6
    attributes:
      label: "Ejercicio 6: ¿Qué apartados debe incluir la descripción de PR propuesta?"
      options:
        - "Resumen, Deploy, Owner"
        - "Branch, Tag, Release"
        - "Qué cambia, Por qué, Cómo se ha probado, Riesgos"
        - "Archivo, Línea, Commit"
    validations:
      required: true
  - type: dropdown
    id: q7
    attributes:
      label: "Ejercicio 7: ¿Por qué usar `git revert <commit>` en un historial compartido?"
      options:
        - "Mueve HEAD a un commit anterior sin guardar cambios"
        - "Fusiona la rama actual con main"
        - "Borra el commit de la historia"
        - "Crea un nuevo commit que deshace el anterior sin reescribir la historia"
    validations:
      required: true
  - type: textarea
    id: learning
    attributes:
      label: "Aprendizaje clave"
      description: "Describe brevemente qué aprendiste en la kata."
      placeholder: "Aprendí que..."
    validations:
      required: true
