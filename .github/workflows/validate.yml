name: Validate Git kata exercise

on:
  push:
    branches:
      - main
      - 'main-**'
      - 'feature/**'
      - 'hotfix/**'
      - 'chore/**'
      - 'rescue/**'
      - 'refactor/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'main-**'
      - 'release/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate exercise branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -q

      - name: Run kata validator
        run: python scripts/validate.py
