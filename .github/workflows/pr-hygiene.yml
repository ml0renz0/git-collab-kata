name: Pull request hygiene

on:
  pull_request:
    branches:
      - main
      - 'main-**'

permissions:
  contents: read
  pull-requests: read

jobs:
  hygiene:
    name: Check PR shape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming and PR size
        shell: bash
        run: |
          set -euo pipefail
          echo "Head branch: ${GITHUB_HEAD_REF}"
          case "${GITHUB_HEAD_REF}" in
            feature/*|hotfix/*|refactor/*|chore/*|rescue/*) ;;
            *) echo "Branch must start with feature/, hotfix/, refactor/, chore/ or rescue/" >&2; exit 1 ;;
          esac

          files_changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" | wc -l | tr -d ' ')
          echo "Files changed: ${files_changed}"
          if [ "${files_changed}" -gt 8 ]; then
            echo "This kata expects small PRs. Split the change or justify it." >&2
            exit 1
          fi

      - name: Reject solution folders
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^(solutions|answers)/'; then
            echo "Do not commit solutions/ or answers/ directories." >&2
            exit 1
          fi
